name: TouchBistro
kind: company
description: TouchBistro is an iPad-based restaurant point-of-sale (POS) and management platform covering
  payments, online ordering, reservations, loyalty, gift cards, marketing, inventory, labor, and reporting.
  TouchBistro does not publish an open, self-serve developer API or a public developer portal; it exposes
  a private, partner-only integration API. The CEO has publicly confirmed an API exists but is not openly
  promoted. Third-party software providers must apply to the integration partner program, be approved,
  and are issued monitored API keys under negotiated commercial terms (contact integratedpartners@touchbistro.com).
